server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /detect {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }

    location /health {
        proxy_pass http://api:8080;
    }

    location /classes {
        proxy_pass http://api:8080;
    }

    location /metrics {
        proxy_pass http://api:8080;
    }

    location /token {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
    }
}
